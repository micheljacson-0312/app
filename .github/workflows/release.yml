name: Release

on:
  workflow_dispatch:

jobs:
  build_backend_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: |
          docker build -t ghl-crm-backend:latest backend
      - name: Save backend image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-tar
          path: |
            $(docker save ghl-crm-backend:latest -o backend-image.tar)

  build_flutter_apk:
    runs-on: ubuntu-latest
    needs: build_backend_image
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install deps
        run: flutter pub get
        working-directory: flutter_app
      - name: Build APK
        run: flutter build apk --release
        working-directory: flutter_app
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
